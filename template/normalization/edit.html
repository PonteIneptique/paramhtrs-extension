{% extends 'base.html' %}
{% block morestyle %}
<style type="text/css">
body { font-family: system-ui, sans-serif; padding:20px; }
.seg { display:inline-block; margin:2px; padding:4px 6px; background:white; border-radius:6px; box-shadow:0 1px 2px rgba(0,0,0,.1); min-width:20px; vertical-align:top; }
.orig { font-weight:600; white-space:pre; }
.reg { margin-top:2px; font-size:0.9em; color:#444; white-space:pre; }
.editable { outline:none; cursor:text; }
.space { background:#eee; }
button { font-size:0.7em; margin-top:2px; margin-left:2px; }
.newline { display:block; }

/* flash card */
.flash-card {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4caf50;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.3s ease;
}
.flash-card.show {
    opacity: 1;
}
</style>
{% endblock %}

{% block content %}
<div id="app">
  <h2>Normalization Editor</h2>
    <div class="row">
        <div class="col-md-4">

    <div class="btn-group btn-group-sm" role="group" aria-label="Status selector">
  <!-- Prefix -->
  <button class="btn btn-secondary disabled" disabled>
    Status:
  </button>

  <!-- Pending -->
  <button
    type="button"
    class="btn"
    :class="normalization.status === 'pending'
      ? 'btn-danger'
      : 'btn-outline-primary'"
    @click="normalization.status = 'pending'"
  >
    Pending
  </button>

  <!-- In review -->
  <button
    type="button"
    class="btn"
    :class="normalization.status === 'active'
      ? 'btn-warning'
      : 'btn-outline-primary'"
    @click="normalization.status = 'active'"
  >
    In the work
  </button>

  <!-- Done -->
  <button
    type="button"
    class="btn"
    :class="normalization.status === 'done'
      ? 'btn-success'
      : 'btn-outline-primary'"
    @click="normalization.status = 'done'"
  >
    Done
  </button>
</div>
        </div>
        <div class="col-md-4 text-start"><a href="{{url_for('bp_norm.normalization_edit_route', normalization_id=normalization.id, format='tei')}}"
                             class="btn btn-sm btn-info"><i class="fa-solid  fa-download"></i> Download this normalization</a></div>
        <div class="col-md-4 text-end"><a href="{{url_for('bp_norm.normalization_delete_route', normalization_id=normalization.id)}}"
          class="btn btn-sm btn-danger"><i class="fa-solid  fa-remove"></i> Delete</a></div>
    </div>

    <hr />
    <div><h2>Original</h2> [[ normalization.original_text ]]</div>
    <hr />
    <h2>Metadata</h2>
    <ul><li v-for="(value, key) in normalization.metadata_json" :key="key">
      <b>[[ key ]]:</b> [[ value ]]
    </li>
    </ul>
    <hr />
    <h2>Normalization</h2>
  <span v-for="seg in normalization.segs" :key="seg.id" class="seg" :class="{ space: seg.orig===' ' && !seg.reg }">
    <div class="orig">[[ seg.orig ]]</div>
    <div
      v-if="seg.reg !== null || !isSpace(seg)"
      class="reg editable"
      contenteditable
      @blur="editReg(seg, $event)"
    >[[ seg.reg || '' ]]</div>

    <div>
      <button class="delete" v-if="isSpace(seg)" @click="deleteSpace(seg)">❌</button>
      <button class="delete" v-if="seg.reg !== null && !isSpace(seg)" @click="dismissReg(seg)">❌</button>
    </div>
    <br v-if="hasMarker(seg)" />
  </span>
  <br>
  <button @click="saveNormalization(normalization)" class="btn btn-primary">Save</button>

  <!-- flash card -->
  <div class="flash-card" ref="flashCard">Saved!</div>
</div>

<script>
function parseSegXML(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, "text/xml");
    const segElems = doc.querySelectorAll("seg");
    let id = 0;
    return Array.from(segElems).map(s => {
        const origElem = s.querySelector("orig");
        const regElem = s.querySelector("reg");
        if (origElem) {
	        id++;
	        return {
	            id,
	            orig: origElem.textContent,
	            reg: regElem ? regElem.textContent : null
	        }
	    } else {
	        id++;
	        return {
	            id,
	            orig: s.textContent,
	            reg: null
	        }
	    }
    });
}

function serializeSegs(segs) {
    let segObjects = segs.map(s => {
        const seg = {};

        if (s.orig) seg.orig = s.orig;
        if (s.reg !== null) seg.reg = s.reg;

        return seg;
    });
    return segObjects;
}

const { createApp } = Vue;

createApp({
    data() {
        return {
            normalization: {{ normalization|tojson }}
        }
    },
    delimiters: ["[[", "]]"],
    created() {
        this.normalization.segs = parseSegXML(this.normalization.xml);
    },
    methods: {
        hasMarker(seg) {
            return typeof seg.orig === "string" && (seg.orig.includes("¶") || seg.orig.includes(":"));
        },
        isSpace(seg) {
            return seg.orig === " " && seg.reg === null;
        },
        editReg(seg, evt) {
            const text = evt.target.textContent;
            seg.reg = text || null;
        },
        dismissReg(seg) {
            seg.reg = null;
        },
        deleteSpace(seg) {
            seg.reg = "";
        },
        showFlash(message) {
            const card = this.$refs.flashCard;
            card.textContent = message;
            card.classList.add("show");
            setTimeout(() => card.classList.remove("show"), 1500);
        },
        saveNormalization(normalization) {
            const segObjects = serializeSegs(normalization.segs);
            fetch("{{url_for('bp_norm.normalization_edit_route', normalization_id=normalization.id)}}", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({id: normalization.id, json: segObjects, status: normalization.status})
            })
            .then(r => r.json())
            .then(data => {
                if(data.status==="ok") {
                    this.showFlash("Saved!");
                    // reload normalization. from server to reflect updates
                    this.normalization = data.content;
                    this.normalization.segs = parseSegXML(this.normalization.xml);
                }
            });
        }
    }
}).mount("#app");
</script>
{% endblock %}
