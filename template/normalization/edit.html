{% extends 'base.html' %}
{% block morestyle %}
<style type="text/css">
/* ... existing styles ... */
body { font-family: system-ui, sans-serif; padding:20px; }
.seg { display:inline-block; margin:2px; padding:4px 6px; background:white; border-radius:6px; box-shadow:0 1px 2px rgba(0,0,0,.1); min-width:20px; vertical-align:top; position: relative; }
.orig { font-weight:600; white-space:pre; min-height: 1em; text-decoration: underline; text-decoration-color: #ddd; }
.reg { margin-top:2px; font-size:0.9em; color:#444; white-space:pre; text-decoration: underline; text-decoration-color: #ddd; }
.editable { outline:none; cursor:text; }
.space { background:white; text-decoration-color: #000!important; }
button { font-size:0.7em; margin-top:2px; margin-left:2px; }
.selected { outline: 2px solid #4caf50; }

/* XML Editor Style */
.xml-editor-overlay {
    display: block;
    width: 300px;
    font-family: monospace;
    font-size: 12px;
    z-index: 10;
    margin-top: 5px;
}
.xml-invalid { border: 2px solid red; }
</style>
{% endblock %}

{% block content %}
<div id="app">
  <h2>Normalization Editor</h2>
  <hr />
  <h2>Normalization</h2>
  <span
    v-for="seg in normalization.segs"
    :key="seg.id"
    class="seg"
    :class="{
      space: seg.orig === ' ' && !seg.reg,
      selected: selectedSeg === seg
    }"
    @click="selectSeg(seg)"
  >
    <template v-if="editingId !== seg.id">
        <div class="orig">[[ seg.orig ]]</div>
        <div
          v-if="seg.reg !== null || !isSpace(seg)"
          class="reg editable"
          contenteditable spellcheck="false"
          @blur="editReg(seg, $event)"
        >[[ seg.reg || '' ]]</div>
    </template>

    <template v-else>
        <textarea
            class="form-control xml-editor-overlay"
            v-model="xmlBuffer"
            @keydown.enter.prevent="commitXML(seg)"
            @keydown.esc="editingId = null"
            ref="xmlInput"
        ></textarea>
        <small class="text-muted">Press Enter to save, Esc to cancel</small>
    </template>

    <div v-if="editingId !== seg.id">
      <button class="delete" v-if="isSpace(seg)" @click="deleteSpace(seg)">❌</button>
      <button class="delete" v-if="seg.reg !== null && !isSpace(seg)" @click="dismissReg(seg)">❌</button>
    </div>
    <br v-if="hasMarker(seg)" />
  </span>

  <br><br>
  <button @click="saveNormalization(normalization)" class="btn btn-primary">Save</button>
  <div class="flash-card" ref="flashCard">Saved!</div>
</div>

<script>
function parseSegXML(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, "text/xml");
    const segElems = doc.querySelectorAll("seg");
    let id = 0;
    return Array.from(segElems).map(s => {
        const origElem = s.querySelector("orig");
        const regElem = s.querySelector("reg");
        if (origElem) {
	        id++;
	        return {
	            id,
	            orig: origElem.textContent,
	            reg: regElem ? regElem.textContent : null
	        }
	    } else if (regElem) {
	        id++;
	        return {
	            id,
	            orig: "",
	            reg: regElem.textContent
	        }
	    } else {
	        id++;
	        return {
	            id,
	            orig: s.textContent,
	            reg: null
	        }
	    }
    });
}

function serializeSegs(segs) {
    let segObjects = segs.map(s => {
        const seg = {orig: null, reg: null};

        if (s.orig) seg.orig = s.orig;
        if (s.reg !== null) seg.reg = s.reg;

        return seg;
    });
    return segObjects;
}

const { createApp } = Vue;

createApp({
    data() {
        return {
            normalization: {{ normalization|tojson }},
            selectedSeg: null,
            editingId: null, // Tracks which segment is in XML mode
            xmlBuffer: ""    // Holds the string being edited
        }
    },
    delimiters: ["[[", "]]"],
    created() {
        this.normalization.segs = parseSegXML(this.normalization.xml);
    },
    methods: {
        selectSeg(seg) {
            this.selectedSeg = seg;
        },
        handleKeydown(e) {
            if (document.activeElement?.tagName === 'TEXTAREA' || document.activeElement?.isContentEditable) return;

            // Trigger XML Editor on "X"
            if ((e.key === "x" || e.key === "X") && this.selectedSeg) {
                this.enterXmlMode(this.selectedSeg);
                e.preventDefault();
            }
        },
        enterXmlMode(seg) {
            this.editingId = seg.id;
            // Format the XML snippet
            this.xmlBuffer = `<seg><orig>${seg.orig}</orig><reg>${seg.reg || ''}</reg></seg>`;

            // Focus the textarea on next tick
            this.$nextTick(() => {
                if (this.$refs.xmlInput && this.$refs.xmlInput[0]) {
                    this.$refs.xmlInput[0].focus();
                }
            });
        },
        commitXML(seg) {
            const parser = new DOMParser();
            // Wrap in dummy root to validate
            const wrapped = `<root>${this.xmlBuffer}</root>`;
            const doc = parser.parseFromString(wrapped, "text/xml");

            // Check for parsing errors
            const errorNode = doc.querySelector("parsererror");
            if (errorNode) {
                alert("Invalid XML structure. Please fix it before saving.");
                return;
            }

            // Extract all <seg> elements from the buffer
            const segElems = doc.querySelectorAll("seg");
            if (segElems.length === 0) {
                alert("The XML must contain at least one <seg> tag.");
                return;
            }

            const newSegs = Array.from(segElems).map(s => {
                const o = s.querySelector("orig");
                const r = s.querySelector("reg");
                return {
                    id: Date.now() + Math.random(),
                    orig: o ? o.textContent : s.textContent,
                    reg: r ? r.textContent : null
                };
            });

            // Replace the old segment with the new list of segments
            const idx = this.normalization.segs.indexOf(seg);
            if (idx !== -1) {
                this.normalization.segs.splice(idx, 1, ...newSegs);
            }

            this.editingId = null;
            this.xmlBuffer = "";
        },
        // ... Keep existing methods (hasMarker, isSpace, editReg, dismissReg, deleteSpace, saveNormalization) ...
        hasMarker(seg) {
            return typeof seg.orig === "string" && (seg.orig.includes("¶") || seg.orig.includes(":"));
        },
        isSpace(seg) {
            return seg.orig === " " && seg.reg === null;
        },
        editReg(seg, evt) {
            const text = evt.target.textContent;
            seg.reg = text || null;
        },
        dismissReg(seg) {
            seg.reg = null;
        },
        deleteSpace(seg) {
            const segs = this.normalization.segs;
            const idx = segs.indexOf(seg);
            if (idx <= 0 || idx >= segs.length - 1) return;
            const prev = segs[idx - 1];
            const next = segs[idx + 1];
            let orig = (prev.orig || "") + seg.orig + (next.orig || "");
            let reg = (prev.reg !== null || next.reg !== null) ? (prev.reg ?? prev.orig) + (next.reg ?? next.orig) : null;
            prev.orig = orig;
            prev.reg = reg;
            segs.splice(idx, 2);
        },
        showFlash(message) {
            const card = this.$refs.flashCard;
            card.textContent = message;
            card.classList.add("show");
            setTimeout(() => card.classList.remove("show"), 1500);
        },
        saveNormalization(normalization) {
            const segObjects = serializeSegs(normalization.segs);
            fetch("{{url_for('bp_norm.normalization_edit_route', normalization_id=normalization.id)}}", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({id: normalization.id, json: segObjects, status: normalization.status})
            })
            .then(r => r.json())
            .then(data => {
                if(data.status==="ok") {
                    this.showFlash("Saved!");
                    this.normalization = data.content;
                    this.normalization.segs = parseSegXML(this.normalization.xml);
                }
            });
        }
    },
    mounted() {
        document.addEventListener("keydown", this.handleKeydown);
    },
    beforeUnmount() {
        document.removeEventListener("keydown", this.handleKeydown);
    }
}).mount("#app");
</script>
{% endblock %}
