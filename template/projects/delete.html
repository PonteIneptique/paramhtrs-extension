{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <div class="alert alert-danger">
    <h2>Delete Project</h2>
    <p>Are you sure you want to delete <strong>{{ project.name }}</strong>?</p>
    {% if project.description %}
    <p class="text-muted">{{ project.description }}</p>
    {% endif %}
    <p><small>This will permanently delete all documents, pages, and lines inside this project.</small></p>
    <a href="{{ url_for('bp_project.project_delete', project_id=project.id, confirm=True) }}"
       class="btn btn-danger">Delete</a>
    <a href="{{ url_for('bp_project.project_browse', project_id=project.id) }}"
       class="btn btn-secondary ms-2">Cancel</a>
  </div>
</div>
{% endblock %}
