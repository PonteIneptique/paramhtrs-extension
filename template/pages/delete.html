{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <h2>Delete Page</h2>
  <p>Are you sure you want to delete page <strong>{{ page.label }}</strong>?
     This will permanently remove all {{ page.line_count }} lines on this page.</p>
  <a href="{{ url_for('bp_page.page_delete', page_id=page.id, confirm=True) }}" class="btn btn-danger">Yes, delete</a>
  <a href="{{ url_for('bp_page.page_editor', page_id=page.id) }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</div>
{% endblock %}
