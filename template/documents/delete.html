{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <h2>Delete Document</h2>
  <p>Are you sure you want to delete document <strong>{{ page.label }}</strong>?
     This will permanently remove all {{ page.line_count }} lines in this document.</p>
  <a href="{{ url_for('bp_document.document_delete', document_id=page.id, confirm=True) }}" class="btn btn-danger">Yes, delete</a>
  <a href="{{ url_for('bp_document.document_editor', document_id=page.id) }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</div>
{% endblock %}
