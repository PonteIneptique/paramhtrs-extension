{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <h2>Delete Document</h2>
  <p>Are you sure you want to delete <strong>{{ document.name }}</strong>?
     This will permanently remove all its pages and lines.</p>
  <a href="{{ url_for('bp_document.document_delete', document_id=document.id, confirm=True) }}" class="btn btn-danger">Yes, delete</a>
  <a href="{{ url_for('bp_document.document_browse', document_id=document.id) }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</div>
{% endblock %}
