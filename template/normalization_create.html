{% extends "base.html" %}
{% block content %}

<div id="app">

  <!-- =====================
       INPUT STEP
       ===================== -->

  <div v-if="step === 'input'" class="card shadow-sm">

    <div class="card-body">

      <h5 class="card-title mb-3">New Normalizations</h5>

<div class="mb-3 row">
  <label class="form-label col-12">Project</label>

  <!-- Left column: selected project -->
  <div class="col-md-4 mb-2">
    <div v-if="selectedProject" class="card p-2">
      <strong>
        <i class="fa-regular fa-folder-open"></i>
        [[ selectedProject.name ]]
      </strong>
    </div>
    <div v-else class="text-muted p-2">No project selected</div>
  </div>

  <!-- Right column: search + list -->
  <div class="col-md-8">
    <div class="input-group mb-2">
      <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
      <input
        class="form-control"
        v-model="projectQuery"
        @input="searchProjects"
        placeholder="Search project…"
      >
    </div>

    <div v-if="projects.length" class="list-group">
      <button
        type="button"
        class="list-group-item list-group-item-action list-group-item-secondary"
        v-for="p in projects"
        :key="p.id"
        @click="selectProject(p)"
      >
        <i class="fa-regular fa-folder-open"></i> [[ p.name ]]
      </button>
    </div>
  </div>
</div>


      <div class="mb-3">
        <label class="form-label">Document name</label>
        <input class="form-control" v-model="document_name">
      </div>

      <div class="mb-3">
        <label class="form-label">Manuscript name</label>
        <input class="form-control" v-model="manuscript_name">
      </div>

      <div class="mb-3">
        <label class="form-label">Language</label>
        <select class="form-control" v-model="language">
            <option value="fre">French</option>
            <option value="fre">Latin</option>
            <option value="fre">Spanish</option>
            <option value="fre">Italian</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Biblissima QID</label>
        <input class="form-control" v-model="qid">
      </div>

     <div class="mb-3">
  <label class="form-label">Input text</label>

  <textarea
    class="form-control"
    rows="8"
    v-model="inputtext"
    placeholder="One line = one unit to normalize"
  ></textarea>

  <div class="form-text">
    <strong>Rule:</strong> one line = one unit.<br>
    Use the helper to split around pilcrow signs (¶).
  </div>

  <button
    type="button"
    class="btn btn-outline-secondary btn-sm mt-2"
    @click="normalizeTextarea(true)"
  >
    Split on ¶ / clean lines
  </button>
</div>

      <div class="d-flex justify-content-between">
        <button class="btn btn-primary" @click="normalize">
          Normalize
        </button>
      </div>

    </div>
  </div>

  <!-- =====================
       LOADING STEP
       ===================== -->
  <div v-if="step === 'loading'" class="text-center my-4">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 text-muted">Normalizing…</div>
  </div>

  <!-- =====================
       REVIEW STEP
       ===================== -->
  <div v-if="step === 'review'" class="card shadow-sm">
    <div class="card-body">

      <h5 class="card-title mb-3">Review normalization</h5>

      <div
        v-for="(item, i) in results"
        :key="i"
        class="card mb-2"
      >
        <div class="card-body py-2">

          <div class="small text-muted mb-1">
            [[ item.orig ]]
          </div>

          <textarea
            class="form-control form-control-sm"
            v-model="item.reg"
          ></textarea>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-outline-secondary" @click="step = 'input'">
          ← Back
        </button>

        <button class="btn btn-primary" @click="save">
          Save
        </button>
      </div>

    </div>
  </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp } = Vue

createApp({
  delimiters: ['[[', ']]'],
  data() {
    return {
      step: 'input',

      document_name: '',
      manuscript_name: '',
      qid: '',
      inputtext: '',

      projectQuery: '',
      projects: [],
      selectedProject: null,

      results: []
    }
  },
  mounted() {
    // Fetch all projects on page load
    this.searchProjects()
  },
  methods: {
    async searchProjects() {

      const response = await fetch(
        "{{ url_for('bp_project.project_lists', format='json') }}&search=" +
          encodeURIComponent(this.projectQuery || '')
      )

      this.projects = await response.json()
    },

    selectProject(project) {
      this.selectedProject = project
      this.projectQuery = project.name
      this.projects = []
    },
    normalizeTextarea(preview = false) {
        let text = this.inputtext || ""

        // Normalize line breaks
        text = text.replace(/\r?\n/g, ' ');

        // Trim each line and drop empties
        text = text
          .split('\n')
          .map(l => l.trim())
          .filter(l => l.length > 0)
          .join('\n');

        // Insert newline before pilcrow
        text = text.replace(/\s*¶\s*/g, '\n¶ ')


        this.inputtext = text

        if (preview) {
          // alert("Input normalized: one line = one unit.")
        }
      },
    async normalize() {
      if (!this.selectedProject) {
        alert("Please select a project first.")
        return
      }
      this.step = 'loading'

      const response = await fetch(
        "{{ url_for('bp_main.normalization_process_route') }}",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            document_name: this.document_name,
            manuscript_name: this.manuscript_name,
            project_id: this.selectedProject.id,
            language: this.language,
            qid: this.qid,
            inputtext: this.inputtext
          })
        }
      )

      this.results = await response.json()
      this.step = 'review'
    },

    async save() {
      if (!this.selectedProject) {
        alert("No project selected.")
        return
      }
      await fetch(
        "{{ url_for('bp_main.normalization_new_route') }}",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            document_name: this.document_name,
            project_id: this.selectedProject.id,
            manuscript_name: this.manuscript_name,
            language: this.language,
            qid: this.qid,
            normalizations: this.results
          })
        }
      )

      window.location.reload()
    }
  }
}).mount("#app")
</script>

{% endblock %}
