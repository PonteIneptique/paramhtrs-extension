{% extends 'base.html' %}

{% block content %}
<div class="alert alert-danger">
    <h2>Confirmation</h2>
    <p>Are you sure you want to delete the line {{ line.id }} ?</p>
    <p>{{line.original_text}}</p>
    <p class="text-small"><small>{{line.xml}}</small></p>
    <p>
        <a href="{{url_for('bp_main.delete_route', line_id=line.id, confirm=True)}}" class="btn btn-danger">Delete</a>
        <a href="{{url_for('bp_main.lines_list_route')}}">Back to line</a>
    </p>
</div>
{% endblock %}
